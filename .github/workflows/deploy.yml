name: Deploy

# ──────────────────────────────────────────────────────────────────────────────
# ARCHITECTURE
#   Frontend  →  Windows shared hosting (IIS) via FTP  — static files only
#   Backend   →  Railway (Node.js platform)             — auto-deploy via GitHub
#
# WHY SPLIT:
#   Windows shared hosting can only serve static files.
#   Node.js requires a process host; Railway provides that with persistent disk
#   so NeDB database files survive restarts.
#
# ONE-TIME SETUP (Railway — free account, no CLI needed):
#   1. railway.app → New Project → Deploy from GitHub repo
#   2. Select the repo → set Root Directory to "backend"
#   3. Add environment variables in Railway dashboard:
#        PORT        = 3001
#        JWT_SECRET  = <a long random string>
#   4. Add a Volume in Railway dashboard → mount path: /app/data
#      (this keeps your NeDB .db files across deploys)
#   5. In backend/src/config/database.ts make sure the data path reads from
#      an env var (see DATA_PATH note below)
#   6. Copy the Railway deploy hook URL into the GitHub secret RAILWAY_DEPLOY_HOOK
#      (Railway project → Settings → Deploy Hooks → Create hook)
#
# GITHUB SECRETS REQUIRED (Settings → Secrets and variables → Actions):
#
#   Frontend (FTP):
#     FTP_SERVER           e.g. ftp.radmilcak.rs
#     FTP_USERNAME         FTP username
#     FTP_PASSWORD         FTP password
#     FTP_FRONTEND_PATH    Remote web root, e.g. /
#     VITE_API_URL         Railway backend URL + /api,
#                          e.g. https://alltrack-backend.up.railway.app/api
#
#   Backend (Railway):
#     RAILWAY_DEPLOY_HOOK  Deploy hook URL from Railway dashboard
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  # ── Frontend → FTP to Windows shared hosting ────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend (FTP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: ${{ secrets.FTP_FRONTEND_PATH }}
          dangerous-clean-slate: false
          log-level: standard

  # ── Backend → Railway (Node.js + persistent disk) ───────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway deploy
        run: |
          curl --fail -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"
