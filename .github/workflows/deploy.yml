name: Deploy via FTP

# ──────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   FTP_SERVER          FTP hostname, e.g. ftp.yourdomain.com
#   FTP_USERNAME        FTP username
#   FTP_PASSWORD        FTP password
#   FTP_FRONTEND_PATH   Remote path for frontend, e.g. /public_html/
#   FTP_BACKEND_PATH    Remote path for backend,  e.g. /app/backend/
#   VITE_API_URL        Public API base URL,       e.g. https://yourdomain.com/api
#
# Optional secrets (enable SSH restart after backend upload):
#   SSH_HOST            Server hostname or IP
#   SSH_USER            SSH username
#   SSH_PRIVATE_KEY     Private key (PEM, no passphrase)
#   SSH_PORT            SSH port (default 22)
#   SSH_BACKEND_PATH    Absolute path on server,   e.g. /app/backend
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: ${{ secrets.FTP_FRONTEND_PATH }}
          dangerous-clean-slate: false
          log-level: standard

  # ── Backend ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ${{ secrets.FTP_BACKEND_PATH }}
          # Upload only compiled output + package manifests; skip everything else
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            **/*.ts
            **/tsconfig*.json
            **/.env*
            **/data/**
          dangerous-clean-slate: false
          log-level: standard

      # ── Optional: SSH restart ──────────────────────────────────────────────
      # Runs npm install --production on the server and restarts via PM2.
      # Only executes when SSH_HOST secret is set; safe to skip otherwise.
      - name: Restart backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.SSH_BACKEND_PATH }}"
            npm install --production --quiet
            pm2 restart alltrack-backend 2>/dev/null \
              || pm2 start dist/server.js --name alltrack-backend
            pm2 save
